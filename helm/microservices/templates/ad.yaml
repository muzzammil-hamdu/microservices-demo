
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad
  template:
    metadata:
      labels:
        app: ad
    spec:
      containers:
      - name: ad
        image: acrdev12345.azurecr.io/ad:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ad
spec:
  selector:
    app: ad
  ports:
  - port: 80
    targetPort: 8080
