
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email
  template:
    metadata:
      labels:
        app: email
    spec:
      containers:
      - name: email
        image: acrdev12345.azurecr.io/email:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: email
spec:
  selector:
    app: email
  ports:
  - port: 80
    targetPort: 8080
