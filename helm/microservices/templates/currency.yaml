
apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency
spec:
  replicas: 2
  selector:
    matchLabels:
      app: currency
  template:
    metadata:
      labels:
        app: currency
    spec:
      containers:
      - name: currency
        image: acrdev12345.azurecr.io/currency:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: currency
spec:
  selector:
    app: currency
  ports:
  - port: 80
    targetPort: 8080
